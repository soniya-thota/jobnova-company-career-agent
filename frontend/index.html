<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Jobnova Company Career Agent</title><link rel="stylesheet" href="/static/style.css"></head>
<body><main class="shell"><section class="hero"><span class="eyebrow">AI JOB SOURCE AGENT</span><h1>Jobnova Company Career Agent</h1><p>Paste a LinkedIn job URL. The agent captures the external hiring link and returns the company, careers page, and opening.</p></section>
<section class="panel"><label for="url">Paste LinkedIn Job URL</label><input id="url" placeholder="https://www.linkedin.com/jobs/view/..." autocomplete="off"><label class="check"><input id="show" type="checkbox"> <span>Watch browser automation</span></label><button id="go">Discover</button><div id="progress" class="progress hidden">Opening LinkedIn and discovering the role…</div></section>
<section id="result" class="panel hidden"><div class="result-head"><h2>Discovery Results</h2><span id="badge" class="badge"></span></div><div id="cards" class="grid"></div><details><summary>Raw JSON</summary><pre id="raw"></pre></details></section></main><script src="/static/app.js"></script></body></html>
